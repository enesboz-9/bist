name: Keep Streamlit Alive

on:
  schedule:
    # Her 5 dakikada bir çalışır (daha sık = daha az uyuma riski)
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Streamlit App (Full Request)
        run: |
          echo "Ping basladi: $(date)"

          curl -L -s -o /dev/null -w "%{http_code}" \
          -H "User-Agent: Mozilla/5.0" \
          https://liicwet2rsxjrxjmtbvt5w.streamlit.app/

          echo ""
          echo "Ping basarili: $(date)"
