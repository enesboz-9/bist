name: Keep Streamlit Alive

on:
  schedule:
    # Her 15 dakikada bir çalışması yeterlidir. 
    # GitHub 5 dakikalık cron'ları bazen geciktirebilir veya limitleyebilir.
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Streamlit App
        run: |
          echo "Ping basladi: $(date)"
          
          # -f: HTTP hatası alırsan hata döndür
          # -m 30: Maksimum 30 saniye bekle
          # -I: Sadece header bilgilerini çek (tüm sayfayı indirip yük oluşturma)
          
          RESPONSE=$(curl -f -s -I -L -H "User-Agent: Mozilla/5.0" https://liicwet2rsxjrxjmtbvt5w.streamlit.app/ || echo "FAIL")
          
          if [ "$RESPONSE" == "FAIL" ]; then
            echo "Uygulamaya ulasilamadi!"
            exit 1
          else
            echo "Ping basarili!"
            echo "Zaman: $(date)"
          fi
